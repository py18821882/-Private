services:
  postgres:
    image: postgres:18
    container_name: ai_system_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: ai_system
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ai_system"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
